services:
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling-pdf
    ports:
      - "8080:8080"
    environment:
      DOCKER_ENABLE_SECURITY: "false"

  chatgpt-app:
    build:
      context: ../../chatgpt-app
    container_name: stirling-pdf-chatgpt-app
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      PUBLIC_BASE_URL: "http://localhost:8787"
      STIRLING_BASE_URL: "http://stirling-pdf:8080"
      STIRLING_PUBLIC_URL: "http://localhost:8080"
      MAX_FILE_MB: "50"
    depends_on:
      - stirling-pdf
