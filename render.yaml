services:
  - type: web
    name: clipmind-chatgpt-app
    runtime: node
    plan: free
    rootDir: chatgpt-app
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PUBLIC_BASE_URL
        value: https://clipmind-chatgpt-app.onrender.com
      - key: STIRLING_BASE_URL
        sync: false
      - key: STIRLING_PUBLIC_URL
        sync: false
      - key: MAX_FILE_MB
        value: 50
